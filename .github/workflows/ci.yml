name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install .

      - name: Console script smoke test
        run: adobe-stock-csv --help

      - name: Direct script smoke test
        run: python src/adobe_stock_csv_cli.py --help

      - name: Unit tests
        run: python -m unittest -q tests/test_adobe_stock_csv_cli.py
